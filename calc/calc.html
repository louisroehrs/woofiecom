	var total=0.0
	var keyin=''
	var decimal = 0
	
	function clickedold(buttonname) {
		document.images['digit' + buttonname].src= 'd' + buttonname + '.gif'
		}
		
	function clicked(buttonname) {
		if (keyin.length ==0) 
			cleardisplay();
		
		if (keyin.length <9 ) {
			keyin = keyin+buttonname;
			display(keyin)
		}
	}

	function cleardisplay() {
		for (i=8;i>0;i--) {
			document.images['digit' + i].src = 'dblank.gif';
			document.images['digitdot' + i].src = 'dnodot.gif'
		}
	}

	function addme() {
		total = total + parseFloat(keyin);
		display(total);
		keyin='';
		decimal=0;
	}
	
	function dot() {
		if (decimal == 0) {
			keyin=keyin + '.';
			if (keyin == ".") {
				cleardisplay();
				keyin ="0.";
				}
			display(keyin);
			decimal=1;
		}
	}
	
	function display(amount) {
		totalstring = amount.toString();
		c=0;
		for (i=0; i<9 ;i++) {
			nextchar= totalstring.substring(totalstring.length-c-1,totalstring.length-c);
			c++;
			if (c <= totalstring.length) {
				if (nextchar == ".")  {
					document.images['digitdot'+(i)].src= 'ddot.gif';
						nextchar= totalstring.substring(totalstring.length-c-1,totalstring.length-c);
						c++;
				}
				else {
					document.images['digitdot'+(i)].src= 'dnodot.gif';
				}
			
			document.images['digit' + (i)].src= 'd' + nextchar + '.gif';
	
			}
		}
	}
	
			
	function displayat(imagename, myvalue) {
		tens =  ""+ Math.round((myvalue / 10)-.5);
		tens = tens.substring(0,1);
		document.images[imagename + "10"].src= "dg" + tens + ".gif";
		document.images[imagename + "1"].src= "dg" + (myvalue % 10) + ".gif";
		<!-- document.woof.debug.value = (myvalue/10) + "}}" + tens +"((" + today + " ))";	 -->
	}

	function tick(timerID) {
		today = new Date();
		hour = today.getHours();
		day ='am'
		if (hour > 12) {
			hour -= 12
			day='pm'
			}
		minute = today.getMinutes();
		displayat("hours",hour,today);
		displayat("mins",minute,today);
		document.images["ampm"].src = "dg" + day +".gif"
		timerID = setTimeout("tick()",1000)
   		timerRunning = true

		}
	
	function startclock(){
	   // Make sure the clock is stopped
   		stopclock()
   		tick()
		}


	var timerID = null
	var timerRunning = false
	
	function startclock() {
		timerID=setTimeout('tick(timerID)',5000)
		}
	
	function stopclock(){
   		if(timerRunning)
      		clearTimeout(timerID)
   			timerRunning = false
		}

</SCRIPT>
