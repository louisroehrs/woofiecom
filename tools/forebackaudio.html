	<TITLE>woofie's toolbox - foreground & background audio</TITLE>

<SCRIPT LANGUAGE=JavaScript>
	function PlaySound(sound) {
		if (sound == null) {  
            return;
		}
		else {
			sound.play(false);
		}
	}
	function PauseSound(sound) {
		if (sound == null) {  
            return;
		}
		else {
			sound.pause();
		}
	}
	function ResumeSound(sound) {
		if (sound == null) {  
            return;
		}
		else {
			sound.resume();
		}
	}
	function IsPlaying(sound) {
		if (sound == null) {  
            return;
		}
		else {
			return(sound.isPlaying());
		}
	}

	function swapimage() {
	
		if (document.doggies.src == "doggies.jpg") {
			document.doggies.src = "/ROMCache/spacer.gif";
		} else {
			document.doggies.src = "doggies.jpg";
		}

//		window.location="newbell3.mid";
		alert(1);
		PauseSound(document.var);
				alert(2);
		PlaySound(document.bell);
				alert(3);
		while (IsPlaying(document.bell)) {
			alert("wating");
		 }
				alert(4);
		ResumeSound(document.var);
		alert(5);
		status="woofie";
	}
</SCRIPT>

</HEAD>
