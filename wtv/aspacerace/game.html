// CELL Object

	function Cell(objName, game, possible, position, contents, part, x,y, cellWidth, cellHeight) {
		if (objName == "") {
			objName = "Cell" + x + "at" + y
		}
		this.objName = objName
		this.possible = possible
		this.nexthop = null
		this.prevhop = null
		this.arrow = LoadImage("images/face" + contents +  ".gif");
		this.covered = 1
		this.game = game
		this.contents = contents
		this.part = LoadImage("images/part" + part + ".gif");
		this.parthigh = LoadImage("images/part" + part + "glow.gif"); 
		this.lightgreen = LoadImage("images/green.gif");
		this.lightred = LoadImage("images/red.gif");
		this.position = position
		this.x = x
		this.y = y
		this.cellWidth = cellWidth
		this.cellHeight = cellHeight
		this.matched = false
	// methods
		this.cover = Cover
		this.uncover = Uncover
		this.matches = Matches
		this.select = SelectCell
		this.render = RenderCell
		
		this.lastMove = LastMove
		this.unhighlight = UnhighlightLastMove
		this.properMove = ProperMove
	}

// CELL methods  Keep pure except for SelectCell


	function LastMove () {

		var prev = this.game.previousCell
		if (prev != null) { prev.unhighlight();}
		
		var lastmove = 1;
		var i=0
		if (this.contents == "u") {
			for (i=this.y; i>=0; i--) {
				if (this.game.board.cells[i][this.x].covered==1) {
					lastmove=0;
					document.images[this.game.board.cells[i][this.x].objName].src= this.game.board.cells[i][this.x].parthigh.src;
				}
			}
		}
		
		if ((this.contents == "d" ) && lastmove) {
			for (i=this.y; i< this.game.board.kHeight; i++) {
				if (this.game.board.cells[i][this.x].covered==1) {
					lastmove=0;
					document.images[this.game.board.cells[i][this.x].objName].src =this.game.board.cells[i][this.x].parthigh.src;

				}
			}
		}
		
		if ((this.contents == "l")  && lastmove) {
			for (i=this.x; i>=0; i--) {
				if (this.game.board.cells[this.y][i].covered==1) {
					lastmove=0;
					document.images[this.game.board.cells[this.y][i].objName].src =this.game.board.cells[this.y][i].parthigh.src;
				}
			}
		}
		
		if ((this.contents == "r")  && lastmove) {
			for (i=this.x; i<this.game.board.kWidth; i++) {
				if (this.game.board.cells[this.y][i].covered==1) {
					lastmove=0;
					document.images[this.game.board.cells[this.y][i].objName].src =this.game.board.cells[this.y][i].parthigh.src;
				}
			}
		}
			
		return lastmove;
	}
	
	function UnhighlightLastMove () {
		var i=0
//  > - - -
//  > - + -

		var lastmove=1
		if (this.contents == "u") {

				if (this.game.board.cells[i][this.x].covered==1) {

		if ((this.contents == "r") && lastmove) {		
			for (i=this.x; i<this.game.board.kWidth; i++) {
				if (this.game.board.cells[this.y][i].covered==1) {
					lastmove=0;

				}
			}
		}
			
	}


	function ProperMove () {
	
		prev = this.game.previousCell
		
		if ((prev == null) && (this.x==0) && (this.y ==0)) return 1	  // Upper right square on first move is OK.
		if (prev == null) return 0   // Any other square on first move is not valid.
		
		if ((prev.contents == "u") && (this.y < prev.y) && (this.x==prev.x)) return 1
		if ((prev.contents == "d") && (this.y > prev.y) && (this.x==prev.x)) return 1
		if ((prev.contents == "l") && (this.x < prev.x) && (this.y==prev.y)) return 1
		if ((prev.contents == "r") && (this.x > prev.x) && (this.y==prev.y)) return 1
		
		return 0
	
	}
		
		
		
	function Uncover() {
		this.covered = 0;
		document.images[this.objName].src = this.arrow.src; 
		var ship = "s" + this.position;
		document.images[ship].src=this.lightgreen.src;

	}

	function Cover() {
		this.covered = 1
		document.images[this.objName].src = this.part.src
		var ship = "s" + this.position
		document.images[ship].src =this.lightred.src;

	}
	
	function RenderCell() { 
		document.write("<td background=images/qtrtoneflat.gif><a selected insetselection href='javascript:mam.board.cells["+ this.y + "][" + this.x + "].select();'><img src='images/spacer.gif' border=0 name='" + this.objName + "' width="+ this.cellWidth+" height=" + this.cellHeight + "></a>");
		document.write("</td>");
	}



	function SelectCell() {
		
		if (this.game.state != "inplay")
			return;

		if (!this.covered) 
			return;
			
		if (!this.properMove()) 
			return;
	
		this.uncover();

		if ((this.x == this.game.board.kWidth-1) && (this.y == this.game.board.kHeight-1)) {
			if (this.game.board.cleared()) {
//				PlaySound("sounds/newbell3.mid");
				window.status = "You win!";
				this.game.win();
			}
			else {
				PlaySound("sounds/buzz.mid")
				window.status = "Select 'Continue' to try another path.";
			}
			return;
		}
		if (this.lastMove()) {
			window.status = "Select 'Continue' to try another path."
			PlaySound("sounds/buzz.mid");
//			document.images["logo"].src = "images/bluecover.gif"
		} 
		this.game.previousCell = this;
		return;
		
	}		

	
	
	function Matches(other) {
		return( this.contents == other.contents ) 
	}

	}
		
// GAME Methods

	function NextMessage() {
		if (this.messageno >= this.messages.length) { this.messageno=0}
		return this.messages[this.messageno++]
	}

	}

//	GAMEBOARD methods
	function GameBoardCleared() {
		
		for (i=0; i < this.kHeight; i++) {
			for (j=0; j < this.kWidth; j++) {
				if (this.cells[i][j].covered) return 0
			}
		}
		return 1
	}
	
	function RenderGameBoard() {
		if (debug) alert("gameboard render");
	 // bgcolor=#222222 bgcolor=111111 bgcolor=005522 bgcolor=111111
		document.write("<table border=0  cellspacing=4 cellpadding=0>");

		for (i=0; i < this.kHeight; i++) {
			document.write("<tr>")
			for (j=0; j < this.kWidth; j++) {
				this.cells[i][j].render()
			}
			document.write("</tr>")
		}
		document.write("</table>");
		if (debug) alert("gameboard done");
	}

	function ClearGameBoard() {
		for (i=0; i < this.kHeight; i++) {
			for (j=0; j < this.kWidth; j++) {
				this.cells[i][j].cover();
		   }
		}
		if (this.kHeight == 3) {
			var ship = "s0";
			for (i=10; i < 16; i++) {
				ship = "s" + i;
				document.images[ship].src="images/green.gif";
			}
		}
		window.status="WebTV Space Race";
		document.images["Cell0at0"].src = this.cells[0][0].parthigh.src;

		this.game.previousCell = null;

	}

		if (this.needToCoverBadMatch ==1) {
		
	//	NO MORE LAYERS OF IF-THEN HERE!!  JUST DON'T DO IT!!!  WEBTV WILL DIE. NETSCAPE OK.

			this.needToCoverBadMatch = 0;
			clearTimeout(this.BadMatchID)
			this.BadMatchTimeoutID = 0
			this.blockClicks = 0;
			this.firstCell.cover();
			this.secondCell.cover();
			this.nextPlayer();
		}
	}
	

	function GetDigit(iNumber, iDigit) {

		iNumber = "" + iNumber;  // Convert to "String" if it isn't already...

		while (iNumber.length < 2) {
			iNumber = "0" + iNumber;
		}
		return(iNumber.charAt(iDigit));
	}

	function splitString(mystring, delimiter) {
		var woofie = new Array()
		var index = 0;
		woofie[index] =""
		for (i=0; i<mystring.length; i++) {
			achar = mystring.charAt(i)
			if ( achar == delimiter) {
				index++
				woofie[index] =""
				}
			else
				woofie[index] += achar
		}

		return woofie
	}

// *************** GET VARIABLES ****************

	function getURLvar(Name) {
		var search = Name + "="
		var incoming = window.location.search
		if (incoming.length > 0) { // if there are any search parameters
			offset = incoming.indexOf(search) 
			if (offset != -1) { // if parameter exists 
				offset += search.length 
				// set index of beginning of value
				end = incoming.indexOf("&", offset) 
				// set index of end of cookie value
				if (end == -1) 
					end = incoming.length
				value = unescape(incoming.substring(offset, end))
				if (value == "") {
					return null
				} else {
					return value
				}
			}
			else return null
		}
		else return null
	}
