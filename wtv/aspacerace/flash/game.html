	function ProperMove () {
	
		prev = this.game.previousCell
		
		if ((prev == null) && (this.x==0) && (this.y ==0)) return 1	  // Upper right square on first move is OK.
		if (prev == null) return 0   // Any other square on first move is not valid.
		
		if ((prev.contents == "u") && (this.y < prev.y) && (this.x==prev.x)) return 1
		if ((prev.contents == "d") && (this.y > prev.y) && (this.x==prev.x)) return 1
		if ((prev.contents == "l") && (this.x < prev.x) && (this.y==prev.y)) return 1
		if ((prev.contents == "r") && (this.x > prev.x) && (this.y==prev.y)) return 1
		
		return 0
	
	}

	function SelectCell() {
		
		if (this.game.state != "inplay")

		}
		if (!this.properMove()) {
			window.status = "Hey, see where that last guy was looking?";
			return;
		}
		this.uncover();

		if ((this.x == this.game.board.kWidth-1) && (this.y == this.game.board.kHeight-1)) {

				PlaySound(document.bell)

// CLOCK Object	 Countdown clock: All units in seconds
	function Clock (game, name, startSeconds, stopSeconds,imageroot) {
		this.game = game
		this.name = name          // Image name is [name][1|10]min[digit] for HTML location.
		this.time = startSeconds
		this.stop = stopSeconds

		this.interval = 60
		this.images = LoadClockImages(imageroot)
	   // methods
		this.decrement = DecrementClock
		this.increment = IncrementClock
		this.update = UpdateClock
		this.render = RenderClock
		this.start = IncrementClock
				
	}
	
	
// CLOCK methods

	function UpdateClock() {
		if ( this.time >= 0) {
			var minutes = Math.floor (( this.time)/60);
			//var seconds = this.time % 60;
			//var tens =  Math.round((seconds / 10) -.5);
			//document.images[this.name + "10sec"].src = this.images[tens].src
			document.images[this.name + "1mins"].src = this.images[minutes].src	
			//document.images[this.name + "1secs"].src = this.images[(seconds % 10)].src
		}
	}
	

	function IncrementClock() {

		this.time += this.interval;
		if (this.time > this.stop) {
			this.time = this.stop
			this.game.state = "lost"
			// document.explosion.play(false);	
			this.game.blockClicks = 1;
			Lose();
		}
		else {
			ticker = this.interval * 1000;
			window.setTimeout( this.game.name + "." + this.name + ".increment()", ticker);
		}
		this.update();
	}

		//document.write("<img width=25 height=53 src='" + this.imageroot + "0bg.gif' name='" + this.name + "1secs'>")
		this.start()
		
	}
	function DecrementClock() {
	
		this.time -= this.interval;
		if (this.time < this.stop) {
			this.time = this.stop
			this.game.state = "lost"
			this.game.blockClicks = 1;
			this.game.lose();
		}
		else {
			window.setTimeout( this.game.name + "." + this.name + ".decrement()", this.interval*1000);
		}
		this.update();

	}

// GAMEBOARD Object  new gameboard(size)
	
	function gameboard (game, kWidth, kHeight, cellWidth, cellHeight) {
		this.kWidth = kWidth;
		this.kHeight = kHeight;
		this.cells = new Array(kHeight);
		//methods
		this.render = RenderGameBoard;
		this.game = game;
		this.clear = ClearGameBoard;
		this.cleared = GameBoardCleared;
		
		// initialize
		if (kWidth == 4) {
			possible = new Array("dr","dr","ldr", "ld",
								 "dr","uldr","uldr", "uld",
								 "udr","uldr","uldr", "uld",
								 "ur", "ulr" ,"ulr", "e" )
			dirs = "dddldurlrrduurlr"
		} else 
		if (kWidth == 3) {
			possible = new Array("dr","dr", "ld",
								 "dr","uldr", "uld",
								 "udr","uldr", "uld",
								 "ur", "ulr" , "e" )
			dirs = "rdlrrdulr"
		}
		var part=0;
		for (i=0; i < kHeight; i++) {
			this.cells[i] = new Array(kWidth)
			for (j=0; j < kWidth; j++) {
		
				contents = dirs.charAt(i*kWidth+j)
				this.cells[i][j] = new Cell("", game, possible[i*kWidth+j], i*kWidth+j, contents, part, j,i, cellWidth, cellHeight)
				part++;
		   }
		}
		// this.cells[0][0].findPath()
		
	}
	
//	GAMEBOARD methods
	function GameBoardCleared() {
		
		for (i=0; i < this.kHeight; i++) {
			for (j=0; j < this.kWidth; j++) {
				if (this.cells[i][j].covered) return 0
			}
		}
		return 1
	}

		if (debug) alert("gameboard render");
	 // bgcolor=#222222 bgcolor=111111 bgcolor=005522 bgcolor=111111
		document.write("<table border=0  cellspacing=4 cellpadding=0>");

		for (i=0; i < this.kHeight; i++) {
			document.write("<tr>")
			for (j=0; j < this.kWidth; j++) {
				this.cells[i][j].render()
			}
			document.write("</tr>")
		}
		document.write("</table>");
		if (debug) alert("gameboard done");
	}

	function ClearGameBoard() {
		for (i=0; i < this.kHeight; i++) {
			for (j=0; j < this.kWidth; j++) {
				this.cells[i][j].cover();
		   }
		}
		window.status="OK, Pick up the pieces!";
		this.game.previousCell = null;
	}

	function splitString(mystring, delimiter) {
		var woofie = new Array()
		var index = 0;
		woofie[index] =""
		for (i=0; i<mystring.length; i++) {
			achar = mystring.charAt(i)
			if ( achar == delimiter) {
				index++
				woofie[index] =""
				}
			else
				woofie[index] += achar
		}

		return woofie
	}

// *************** GET VARIABLES ****************

	function getURLvar(Name) {
		var search = Name + "="
		var incoming = window.location.search
		if (incoming.length > 0) { // if there are any search parameters
			offset = incoming.indexOf(search) 
			if (offset != -1) { // if parameter exists 
				offset += search.length 
				// set index of beginning of value
				end = incoming.indexOf("&", offset) 
				// set index of end of cookie value
				if (end == -1) 
					end = incoming.length
				value = unescape(incoming.substring(offset, end))
				if (value == "") {
					return null
				} else {
					return value
				}
			}
			else return null
		}
		else return null
	}
