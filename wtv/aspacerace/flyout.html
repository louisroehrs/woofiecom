    <script>
      window.RufflePlayer = window.RufflePlayer || {};
      window.RufflePlayer.config = {
        "autoplay": "off", 
        "splashScreen": false, 
        "unmuteOverlay":"hidden",
      };

      function launch() {
        document.getElementById("endtitle").style.opacity = 0.0;
        myAudio = document.getElementById("undr_wtv.mid");
        myAudio.currentTime = 0;
        myAudio.play();
        myFlyout = document.getElementById("flyoutvideo");
        myFlyout.play();
      }

      
    </script>

      .slides {
          position:relative;
      }
      
      #endtitle, #flyoutdiv {
          position: absolute;
          top:0;
          left:0;
          width:450px;
          height:311px;
      }

      #endtitle {
          background-color:black;
          transition: opacity 1s;
          display:flex;
          justify-content: center;
          align-items: center;

          font-size: 30px;
          text-align:center;
          text-shadow: 1px 1px black; 
      }
