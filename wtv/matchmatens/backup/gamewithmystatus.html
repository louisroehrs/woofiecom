	function SelectCell() {
		
		if (this.game.state != "inplay")
			return;
	
		if  ((this.matched) || (!this.covered) || (!this.game.waitmatchflip))
			return;
			
		if ( this.game.players.length ==6) {
			// new single player rules.  Click until you get matches.
			if (this.game.pointsSelected == 0 ) {  // Picking first item.
				this.uncover();
				this.game.pointsSelected = 1
				this.game.firstCell = this;
				name1 =  this.game.currentPlayer.name
				document.gameboard.mystatus.value= name1 +"'s Turn: Try to Match This!"
			}
			else {  // Picking next item
				if ( this.matches(this.game.firstCell) ) {  // This item matched
					this.uncover();
					this.matched = true;
					this.game.firstCell.matched = true;
					this.game.secondCell= this
					document.gameboard.mystatus.value="Found a Match! Go again! Pick First Item."
					PlaySound("newbell3.mid");
					this.game.pointsSelected = 0;  // restart matching series.
					this.game.score();
					this.game.waitmatchflip = 0
					window.setTimeout("FlipMatches()",3000)
				}
				else { 					// This item did not match, make it the first item...
					this.game.firstCell.cover()
					this.game.firstCell = this
					this.uncover()
					name1 =  this.game.currentPlayer.name
					document.gameboard.mystatus.value= name1 +"'s Turn: Try to Match This!"
				}
			}
		}
		
		if ( this.game.players.length ==1) {
			// two tiles stay up. single player rules.
			if (this.game.pointsSelected == 0 ) {  // Picking first item.
				this.uncover();
				this.game.pointsSelected = 1
				this.game.firstCell = this;
				name1 =  this.game.currentPlayer.name
				document.gameboard.mystatus.value= name1 +"'s Turn: Try to Match This!"
			}
			else {  // Picking next item
				if (this.game.secondCell != null)
					this.game.thirdCell = this.game.secondCell 
				if (this.game.firstCell != null) {
					this.game.secondCell = this.game.firstCell
					this.game.firstCell=this
				}
				if (this.game.thirdCell != null) 
					this.game.thirdCell.cover()


				if ( this.matches(this.game.secondCell) ) {  // This item matched
					this.uncover();
					this.matched = true;
					this.game.secondCell.matched = true;
					document.gameboard.mystatus.value="Found a Match! Go again! Pick First Item."
					PlaySound("newbell3.mid");
					this.game.pointsSelected = 0;  // restart matching series.
					this.game.score();
					this.game.waitmatchflip = 0
					window.setTimeout("FlipMatches()",3000)
					this.game.thirdCell = null
				}
				else { 					// This item did not match, make it the first item...
				
					this.uncover()
					name1 =  this.game.currentPlayer.name
					document.gameboard.mystatus.value= name1 +"'s Turn: Try to Match This!"
				}

			}
		} else {
		
	
 // || (this.game.players.length ==1)
		if  ((this.game.blockClicks !=1) ) {
															// wait till cells covered if two player

				
			if (this.game.pointsSelected == 1) {
				this.uncover();
				this.game.pointsSelected = 0;				// Selecting second cell

				if ( this.matches(this.game.firstCell) ) {  // Check for a match
					this.matched = true;					// Matched
					this.game.firstCell.matched = true;
					this.game.secondCell= this;
					document.gameboard.mystatus.value="Found a Match! Go again! Pick First Item."
					PlaySound("newbell3.mid");
					this.game.score();
//					this.game.waitmatchflip = 0;
//					window.setTimeout("FlipMatches()",3000);
//					alert("woofie");
				
				}
				else {										//Mis matched
					this.game.blockClicks =1
					this.game.secondCell = this
					this.game.needToCoverBadMatch = 1;
					this.game.BadMatchID = window.setTimeout(this.game.name + ".coverunmatched()", 4000);
					pickfirst =""
					if (this.game.players.length == 1) { picksecond=" Pick First Item."; }
					document.gameboard.mystatus.value="Sorry, No Match Found..." + pickfirst;
					PlaySound("buzz.mid");
				}
			}
			else {											//Selecting first cell 
				if (this.game.players.length ==1) {
					this.game.coverunmatched()		// cover any previously uncovered cells (one player mode only)
				}
				this.game.pointsSelected =1;
				this.game.firstCell = this;
				this.uncover();
				name1 =  this.game.currentPlayer.name
				document.gameboard.mystatus.value=  name1+"'s Turn: Pick Second Item."

			}

		}		
	}
	}

	function Solve() {
		if ((this.players.length == 1) && (this.state == "inplay")) {
			document.gameboard.mystatus.value = "You must find all the matches first."
			return;
		}
		
		var answer = document.gameboard.magic.value
		if (answer == this.puzzletext) {
		name1 = this.currentPlayer.name
		if (name1.indexOf("&") && name1.indexOf(";"))
			document.gameboard.mystatus.value=  name1.substring(0, name1.indexOf("&")) + " " +name1.substring(name1.indexOf(";")+1,name1.length) +" has saved the town!";

			this.currentPlayer.score += 5;
			this.win();
		} else {
			document.gameboard.mystatus.value = "Nope, that is not the magic word"
			this.currentPlayer.score -= 5;

		}
	}

// GAMEBOARD Object  new gameboard(size)
	
	function gameboard (game, kWidth, kHeight, cellWidth, cellHeight) {
		this.kWidth = kWidth
		this.kHeight = kHeight
		this.cells = new Array(kHeight)
		//methods
		this.render = RenderGameBoard
		this.game = game
		this.clear = ClearGameBoard

		// initialize
		var n = this.kWidth * this.kHeight
		var pickings = new Array()
		var k=0
		var i=0
		var j=0
		var xx=0
		var xy=0
		
		for (i=0; i<n; i++ ) {
			pickings[i++] = k
			pickings[i] = 100+ k++;
		}
		var puzzlepickings = this.game.puzzletext+ "                "
		var letters = new Array()
		for (i=0; i<n; i++) {
			letters[i] = puzzlepickings.charAt(i)
		}

		var whitespace = "  :!.,<>@#$%^&*()!~`[]{}=1234567890\|'?/"
		var position = 0
		var match=0
		var letter=0
		var character=0
		var second = 0
		for (i=0; i < this.kHeight; i++) {
			this.cells[i] = new Array()
			for (j=0; j < this.kWidth; j++) {
			//  We have a nice list and we update it to reflect that we have used 1 and then 2 of each match.
				second = 0;
				xx = Math.random() * n 
				xy = Math.floor(xx)
				match = pickings[xy] 
				if (match >= 100) {match -= 100; second=1; }
				n--
				pickings[xy]=pickings[n]
 				 
	// Assign random letter from phrase, if illegal, assign a space.
	
				letter = letters[xy]
				letters[xy]=letters[n]
			
				if (( whitespace.lastIndexOf(letter) >=0) || (letter == null)) letter = "_"  // convert spaces...
				
			//  Now we pick one of kind to display here and put it into content.
				if (second) { cx = Math.random()*3 } else { cx = 3.2 }
			//	cx = Math.random() * 4
				cx = Math.floor(cx) + 1
				content = this.game.imageNames[match] + cx + "." + this.game.imageTileSuffix
		
				this.cells[i][j] = new Cell("", game, content, match, i,j, position++, letter, cellWidth, cellHeight)
		   }
		}
	}

	function splitString(mystring, delimiter) {
		var woofie = new Array()
		var index = 0;
		woofie[index] =""
		for (i=0; i<mystring.length; i++) {
			achar = mystring.charAt(i)
			if ( achar == delimiter) {
				index++
				woofie[index] =""
				}
			else
				woofie[index] += achar
		}

		return woofie
	}

	function getCookie(Name) {
		var search = Name + "="
		if (document.cookie.length > 0) { // if there are any cookies
			offset = document.cookie.indexOf(search) 
			if (offset != -1) { // if cookie exists 
				offset += search.length 
				// set index of beginning of value
				end = document.cookie.indexOf(";", offset) 
				// set index of end of cookie value
				if (end == -1) 
					end = document.cookie.length
				return unescape(document.cookie.substring(offset, end))
			}
			return null
		}
		return null
	}

	function windowOpener() {
		msgWindow=window.open("","displayWindow","menubar=yes")
		msgWindow.document.write("<HEAD><TITLE>Message window</TITLE></HEAD>")
		msgWindow.document.write("<CENTER><BIG><B>Hello, world!</B></BIG></CENTER>")
	}

	}
		
// *************** GET VARIABLES ****************

	function getURLvar(Name) {
		var search = Name + "="
		var incoming = window.location.search
		if (incoming.length > 0) { // if there are any search parameters
			offset = incoming.indexOf(search) 
			if (offset != -1) { // if parameter exists 
				offset += search.length 
				// set index of beginning of value
				end = incoming.indexOf("&", offset) 
				// set index of end of cookie value
				if (end == -1) 
					end = incoming.length
				value = unescape(incoming.substring(offset, end))
				if (value == "") {
					return null
				} else {
					return value
				}
			}
			else return null
		}
		else return null
	}
