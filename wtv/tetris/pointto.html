// *************** GET VARIABLES ****************

	function getURLvar(Name) {
		var search = Name + "="
		var incoming = window.location.search
		if (incoming.length > 0) { // if there are any search parameters
			offset = incoming.indexOf(search) 
			if (offset != -1) { // if parameter exists 
				offset += search.length 
				// set index of beginning of value
				end = incoming.indexOf("&", offset) 
				// set index of end of cookie value
				if (end == -1) 
					end = incoming.length
				value = unescape(incoming.substring(offset, end))
				if (value == "") {
					return null
				} else {
					return value
				}
			}
			else return null
		}
		else return null
	}

// GAME Object  new game(theme elements)
	function game(name, sGameDir, sGameTitle, asImageNames, kWidth, kHeight, cellWidth, cellHeight, iSecondsLeft) {
	
		this.name = name
		this.title = sGameTitle

// GAME Methods
	function Restart() {
		location.reload();
	}
	
	function Win() {
		PlaySound(document.applause)

		}

	}

	function Lose() {

	function SetupGame() {  // called when GAME object constructed...

	// LOAD Players:  This takes care of any slots being filled.  3 only, 1 or 3, etc...
	
		Aplayer = getURLvar ("player0")
		if ( Aplayer != null) {
			this.addplayer(Aplayer)
		}
		Aplayer = getURLvar ("player1")
		if (Aplayer != null) {
				this.addplayer(Aplayer)
		}
		Aplayer = getURLvar ("player2")
		if ( Aplayer != null) {
				this.addplayer(Aplayer)
		}
		if (this.players.length == 0) {  // No slots filled, so add a player
			this.addplayer("Match Maker")
		}

		this.currentPlayer= this.players[0]
	}
	// LOAD game pieces
	
	function LoadGameTiles(imageroot, imageNames) {
		var images= new Array()
		for (i=0; i< imageNames.length; i++) {
			newimage = new Image();
			images[i] = newimage;
			images[i].src = imageroot + imageNames[i] + ".gif"
		}
		return images;
	}
			
	function StartGame() {
		if (this.players.length > 1) {
		 document.images["player0go"].src="images/playergo.gif"
		}
		for (i=0; i< this.players.length; i++ ) {
			this.players[i].updatescore()
		}
	}
	
	function NextPlayer() {
		if (this.players.length > 1) {
			imagename = "player" + this.currentPlayer.id + "go"
			document.images[imagename].src = "images/spacer.gif"
			nextID = (this.currentPlayer.id + 1) % this.players.length
			this.currentPlayer = this.players[nextID]
			imagename = "player" + nextID + "go"
			document.images[imagename].src = "images/playergo.gif"
		}
	}
	
	function Score(points) {
		if (this.players.length == 1) {
			this.currentPlayer.addpoints(100)
		} else {
			this.currentPlayer.addpoints(1)
		}
		this.matched++;
		if ( (this.matched *2) >= ((this.board.kWidth * this.board.kHeight) -1)) {
			this.win();
		}
	}

	function AddPlayer(name) {
		qty =this.players.length

	}

// CELL Object

	function Cell(objName, game, contents, x,y, cellWidth, cellHeight) {
		if (objName == "") {
			objName = "Cell" + x + "at" + y
		}
		this.objName = objName
		this.contents = eval(contents)
		this.covered = 1
		this.game = game
	
		this.x = x
		this.y = y
		this.cellWidth = cellWidth
		this.cellHeight = cellHeight
		this.matched = false
	// methods
		this.cover = Cover
		this.uncover = Uncover
		this.matches = Matches
		this.select = SelectCell
		this.render = RenderCell
	}

// CELL methods  Keep pure except for SelectCell

	function Uncover() {
		document.images[this.objName].src = this.game.images[this.contents].src;
		this.covered = 0;
	}
// 
	function RenderCell() {
		document.write("<td bgcolor=#a52929><a href='javascript:mam.board.cells["+ this.x + "][" + this.y + "].select()'><img transparency=0 src="+ sCoverImage + " border=0 name='" + this.objName + "' width="+ this.cellWidth+" height=" + this.cellHeight + "></a>");
		document.write("</td>");
	}

	function SelectCell() {
		
	if (this.game.state != "inplay")
		return;
	
		if  ((this.matched) || (!this.covered))
			return;

		if  ((this.game.blockClicks !=1) || (this.game.players.length ==1)) {
															// wait till cells covered if two player

				
			if (this.game.pointsSelected == 1) {
				this.uncover();
				this.game.pointsSelected = 0;				// Selecting second cell

				if ( this.matches(this.game.firstCell) ) {  // Check for a match
					this.matched = true;					// Matched
					this.game.firstCell.matched = true;
					PlaySound(document.bell);
					this.game.score();
				}
				else {										//Mis matched
					this.game.blockClicks =1
					this.game.secondCell = this
					this.game.needToCoverBadMatch = 1;
					this.game.BadMatchID = window.setTimeout(this.game.name + ".coverunmatched()", 4000);
					PlaySound(document.buzzer);
				}
			}
			else {											//Selecting first cell 
				if (this.game.players.length ==1) {
					this.game.coverunmatched()		// cover any previously uncovered cells (one player mode only)
				}
				this.game.pointsSelected =1;
				this.game.firstCell = this;
				this.uncover();
			}

		}		
	}
	
	function Matches(other) {
		return( this.contents == other.contents ) 
	}

	function Cover() {
		document.images[this.objName].src = sCoverImage;
		this.covered = 1;
	}

	function Paddpoint(points) {

	function Pupdatescore() {

		document.write("<TD align=left absheight=" + myheight + " valign=middle><FONT SIZE=+2><STRONG><input noselect type=text name=player"+this.id+"score value="+ this.score + " size=5 bgcolor=#595775 usestyle border=0></STRONG></FONT></TD></TR>");
	}
	
// GAMEBOARD Object  new gameboard(size)
	
	function gameboard (game, kWidth, kHeight, cellWidth, cellHeight) {
		this.kWidth = kWidth
		this.kHeight = kHeight
		this.cells = new Array(kHeight)
		//methods
		this.render = RenderGameBoard
		this.game = game
		
		// initialize
		for (i=0; i < kHeight; i++) {
			this.cells[i] = new Array(kWidth)
			for (j=0; j < kWidth; j++) {
				content = puzzle[i+j*kWidth]
				this.cells[i][j] = new Cell("", game, content, i,j, cellWidth, cellHeight)
		   }
		}
	}
	
//	GAMEBOARD methods
	
	function RenderTitle() {
		document.write("<font size='+5'>"+sGameTitle+"</font><BR>");
	}
	
	function RenderGameBoard() {
		if (debug) alert("gameboard render");
	 // bgcolor=#222222
		document.write("<table border=5 bgcolor=111111 cellspacing=6 cellpadding=0 >");

		for (i=0; i < this.kHeight; i++) {
			document.write("<tr>")
			for (j=0; j < this.kWidth; j++) {
				this.cells[i][j].render()
			}
			document.write("</tr>")
		}
		document.write("</table>");
		if (debug) alert("gameboard done");

	}
	
// CALLBACKS
	function CallbackNoMatch() {
		if (this.needToCoverBadMatch ==1) {
	//	NO MORE LAYERS OF IF THEN HERE!!  JUST DON'T DO IT!!!  WEBTV WILL DIE. NETSCAPE OK.

			this.needToCoverBadMatch = 0;
			clearTimeout(this.BadMatchID)
			this.BadMatchTimeoutID = 0
			this.blockClicks = 0;
			this.firstCell.cover();
			this.secondCell.cover();

// CLOCK Object	 Countdown clock: All units in seconds
	function Clock (game, name, startSeconds, stopSeconds,imageroot) {
		this.game = game
		this.name = name          // Image name is [name][1|10]min[digit] for HTML location.
		this.time = startSeconds
		this.stop = stopSeconds
		this.imageroot = imageroot   // root of digit image filenames.  [imageroot][digit].gif  
		this.interval = 1
		this.images = LoadClockImages(imageroot)
	   // methods
		this.decrement = DecrementClock
		this.increment = IncrementClock
		this.update = UpdateClock
		this.render = RenderClock
		this.start = IncrementClock
				
	}
	
	
// CLOCK methods

	function UpdateClock() {
		if ( this.time >= 0) {
			var minutes = Math.round ((( this.time)/60)- .5);
			var seconds = this.time % 60;
			var tens =  Math.round((seconds / 10) -.5);
			document.images[this.name + "10sec"].src = this.images[tens].src
			document.images[this.name + "1mins"].src = this.images[minutes].src	
			document.images[this.name + "1secs"].src = this.images[(seconds % 10)].src
		}
	}
	
	function DecrementClock() {
	
		this.time -= this.interval;
		if (this.time < this.stop) {
			this.time = this.stop
			this.game.state = "lost"
			this.game.blockClicks = 1;
			this.game.lose();
		}
		else {
			window.setTimeout( this.game.name + "." + this.name + ".decrement()", this.interval*1000);
		}
		this.update();

	}
	
	function IncrementClock() {

		this.time += this.interval;
		if (this.time > this.stop) {
			this.time = this.stop
			this.game.state = "lost"
			// document.explosion.play(false);	
			this.game.blockClicks = 1;
			Lose();
		}
		else {
			ticker = this.interval * 1000;
			window.setTimeout( this.game.name + "." + this.name + ".increment()", ticker);
		}
		this.update();
	}

	function RenderClock() {

		document.write("<img width=25 height=53 src='images/spacer.gif' name='" + this.name + "1mins'>")
		document.write("<img width=11 height=53 src='" + this.imageroot + "colon.gif' name=Colon>")
		document.write("<img width=25 height=53 src='images/spacer.gif' name='" + this.name + "10sec'>")
		document.write("<img width=25 height=53 src='images/spacer.gif' name='" + this.name + "1secs'>")
		this.start()
		
	}

	function LoadClockImages(imageroot) {
		var images= new Array()
		for (i=0; i< 10; i++) {
			newimage = new Image();
			images[i] = newimage;
			images[i].src = imageroot + i + ".gif"
		}
		return images;
	}

	function GetDigit(iNumber, iDigit) {

		iNumber = "" + iNumber;  // Convert to "String" if it isn't already...

		while (iNumber.length < 2) {
			iNumber = "0" + iNumber;
		}
		return(iNumber.charAt(iDigit));
	}

	<!-- Generic Game Functions -->

	function getCookie(Name) {
		var search = Name + "="
		if (document.cookie.length > 0) { // if there are any cookies
			offset = document.cookie.indexOf(search) 
			if (offset != -1) { // if cookie exists 
				offset += search.length 
				// set index of beginning of value
				end = document.cookie.indexOf(";", offset) 
				// set index of end of cookie value
				if (end == -1) 
					end = document.cookie.length
				return unescape(document.cookie.substring(offset, end))
			}
		}
	}
