<html>
<head>
<title>WebTV MatchMate</title>

<SCRIPT Language="JavaScript">

	function PlaySound(sound) {

		if (sound == null) {  
            return;
		}
		else {
			sound.play(false);
		}
	}
	
	function PlayLoseTone() {
		PlaySound(document.lose)
		setTimeout("PlayKids()", 3000)
	}
	
	function PlayKids() {
		PlaySound(document.kids)
	}

</SCRIPT>

</head>
<body fontsize=medium 
   valign=top hspace=0 bgcolor=#000000 text=#FFFFFF credits="http://www.woofie.com/webtvmm.html"
   onLoad="PlayLoseTone()">
	<display noscroll nosend skipback>

	<EMBED SRC="sounds/losetone.mid" HIDDEN=TRUE CONTROLS=console
	VOLUME=100 LOOP=FALSE AUTOSTART=FALSE NAME="lose"
	MASTERSOUND>
	<EMBED SRC="sounds/kidstheme8.mid" HIDDEN=TRUE CONTROLS=console
	VOLUME=100 LOOP=FALSE AUTOSTART=FALSE NAME="kids"
	MASTERSOUND>
