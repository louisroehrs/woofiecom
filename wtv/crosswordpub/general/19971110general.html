	function FindAcrossClue(x,y) {

	  var cWordOn = -1;
	  var cx;

          // Check for no clue.
          var xm1  = eval(eval(x)-1);
          var xp1  = eval(eval(x)+1);
          
          var pxm1;
          if (xm1 >= 0) {
            pxm1 = GetCell(xm1, y);
          } else {
            pxm1 = "+"; 
          }

          var pxp1;
          if (xp1 < kWidth) {
            pxp1 = GetCell(xp1, y);
          } else {
            pxp1 = "+";
          }  

          var px = GetCell(x,y);
          if (pxm1 == "+" && px != "+" && pxp1 == "+" ) {
            // No clue, return " "
            return(" ");
          }

	  for (cx=0; cx <= x; cx++) {

             var xm1  = eval(eval(cx)-1);
             var xp1  = eval(eval(cx)+1);

             var pxm1;
             if (xm1 >= 0) {
               pxm1 = GetCell(xm1, y);
             } else {
               pxm1 = "+";
             }

             var pxp1;
             if (xp1 < kWidth) {
               pxp1 = GetCell(xp1, y);
             } else {
               pxp1 = "+";
             }

             var px = GetCell(cx,y);   

	     if (pxm1 == "+" && px != "+" && pxp1 != "+") {
	       cWordOn++;
	     }

	  }

          if (aasAcross[y][cWordOn] != null) {
	    return(aasAcross[y][cWordOn]);
          } else {
            return(" ");
          }

	}

	function FindDownClue(x,y) {

	function CaseSet(j) {
	  for (var i = 0; i < j.value.length;  i++) {
	     var c = j.value.charAt(i);
	     if (c >= 'a' && c <= 'z') {
	       j.value = j.value.toUpperCase();
	     }
	  }
	}

        function SetCookie (name, value) {
          
           var argv = SetCookie.arguments;
           var argc = SetCookie.arguments.length;
           var expires = (argc > 2) ? argv[2] : null;
           var path = (argc > 3) ? argv[3] : null;
           var domain = (argc > 4) ? argv[4] : null;
           var secure = (argc > 5) ? argv[5] : false;
           document.cookie = name + "=" + escape (value) +
              ((expires == null) ? "" : ("; expires=" + expires.toGMTString())) +
              ((path == null) ? "" : ("; path=" + path)) +
              ((domain == null) ? "" : ("; domain=" + domain)) +
              ((secure == true) ? "; secure" : "");       
         
        }

        function GetCookieVal (offset) {
  
          var endstr = document.cookie.indexOf (";", offset);
          if (endstr == -1)
            endstr = document.cookie.length;
          return unescape(document.cookie.substring(offset, endstr));

        }    

        function GetCookie (name) {
       
          var arg = name + "=";
          var alen = arg.length;
          var clen = document.cookie.length;
          var i = 0;

          while (i < clen) {
            var j = i + alen;
            if (document.cookie.substring(i, j) == arg)
              return GetCookieVal (j);

            i = document.cookie.indexOf(" ", i) + 1;
            if (i == 0)
              break;
          }

          return null;

        }

        function SetCookieMacro (sCookieName, sValue) {

          var expdate = new Date ();
          // Save Cookie for 56 days (8 weeks).
          expdate.setTime (expdate.getTime() + (56 * 24 * 60 * 60 * 1000));

          SetCookie (sCookieName, sValue, expdate, "/");

        }
