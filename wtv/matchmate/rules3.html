<SCRIPT Language="JavaScript">

	mam = new game("mam");

	function woof(stuff) {
		alert(stuff);
	}
	
	function getURLvar(Name) {
		var search = Name + "=";
		var incoming = window.location.search;
		if (incoming.length > 0) { // if there are any search parameters
			offset = incoming.indexOf(search);
			if (offset != -1) { // if parameter exists 
				offset += search.length ;
				// set index of beginning of value
				end = incoming.indexOf("&", offset) ;
				// set index of end of cookie value
				if (end == -1) 
					end = incoming.length;
				value = unescape(incoming.substring(offset, end));
				if (value == "") {
					return null;
				} else {
					return value;
				}
			}
			else return null;
		}
		else return null;
	}
	
// GAME Object  new game(theme elements)
	function game(name) {
		this.name = name;
		this.status = "WebTV MatchMate Rules";
		this.players = new Array();
		this.addplayer = AddPlayer;
		this.renderSidebar = RenderSidebar;
		this.setup = SetupGame;
		this.startRules = StartRules;
		this.setup();		
	}
		
// GAME Methods

	function SetupGame() {  // called when GAME object constructed...

	// LOAD Players
		Aplayer = getURLvar ("player0");
		if ( Aplayer != null) {
			this.addplayer(Aplayer);
			this.players[0].score = getURLvar ("p0score");
		}
		else {
			this.addplayer("You");
			this.players[0].score = getURLvar ("p0score");
		}
		Aplayer = getURLvar ("player1");
		if (Aplayer != null) {
				this.addplayer(Aplayer);
				this.players[1].score = getURLvar ("p1score");

		}
		
	}
			
	function AddPlayer(name) {
		qty =this.players.length;
		this.players[qty] = new Player(name, qty);
	}
	
	function RenderSidebar() {	
		document.write("<IMG width=14 height=24 src=/wtv/ROMCache/spacer.gif align=absmiddle><FONT SIZE=4 COLOR=#FFFFFF><STRONGs><shadow>Player One</shadow></STRONG></FONT><SUB>&nbsp;</SUB><BR>");
		this.players[0].render();

		if (this.players.length == 2) {
			document.write("<IMG width=8 height=4 src=/wtv/ROMCache/spacer.gif><BR>");
			document.write("<IMG width=14 height=25 src=/wtv/ROMCache/spacer.gif align=absmiddle><FONT SIZE=4 COLOR=#FFFFFF><STRONsG><shadow>Player Two</shadow></STRONG></FONT><SUB>&nbsp;</SUB><BR>");			
			this.players[1].render();
		} else {
			document.write("<IMG width=8 height=70 src=/wtv/ROMCache/spacer.gif><BR>");
		}
	}	
	

		function StartRules() {
			window.status= this.status;
		}
		
// PLAYER Object

	function Player(name, id) {
		this.name = name;
		this.score = 0;
		this.id = id;
	// methods
		this.addpoints = Paddpoint;
		this.updatescore = Pupdatescore;
		this.render = Prender;
	}

// PLAYER methods

	function Paddpoint(points) {
		this.score += points;
		this.updatescore();
	}

	function Pupdatescore() {
		document.scoreboard["player"+	this.id+"score"].value = this.score;
	}

	function Prender() { // Does need to be in its own table...Indicator is the Current Player Arrow

		document.write("<IMG width=14 height=3 src=/wtv/ROMCache/spacer.gif><table  border=0 cellpadding=0 cellspacing=0 cellborder=0>");
		document.write("<tr><td width=14></td><td width=138 height=22 bgcolor=000000 valign=bottom align=center><FONT SIZE=3> "+this.name + "</FONT></td></tr></table><br>");
	}
	
	function PassQueryToPage(pageName) {
		if ((pageName == "game.html") && (mam.players.length == 2) )
			pageName = "player1.html";
		bigwoofie = pageName + "?" + window.location.search;
		window.location = bigwoofie;
	}


	function Redirect(sURL) {
	  window.location=sURL;
	}
