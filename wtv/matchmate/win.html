<script language="JavaScript">

function getURLvar(Name) {
	var search = Name + "=";
	var incoming = window.location.search;
	if (incoming.length > 0) { // if there are any search parameters
		offset = incoming.indexOf(search);
		if (offset != -1) { // if parameter exists 
			offset += search.length ;
			// set index of beginning of value
			end = incoming.indexOf("&", offset) ;
			// set index of end of cookie value
			if (end == -1) 
				end = incoming.length;
			value = unescape(incoming.substring(offset, end));
			if (value == "") {
				return null;
			} else {
				return value;
			}
		}
		else return null;
	}
	else return null;
}

function Redirect(sURL) {
  window.location=sURL;
} 

function GetSelection (thisControl) {
	return thisControl.options[thisControl.selectedIndex].text
}

function ToPage(pageName) {
	var player0 =getURLvar("player0");
	var player1 =getURLvar("player1");
	var player2 = ""
	var mysearch = window.location.search
	if (mysearch != null) {
		var modifier= ""
		if (mysearch.charAt(0) != "?")
			mysearch = "?"+ mysearch;   
	}
	else
	{
		modifier = "?"
		mysearch = ""
	}

	if ((pageName == "game.html") && (player1 !="") && (player0 !="") )
		pageName = "player1.html"
	location.href=pageName+mysearch+modifier+"player0=" + player0 + "&player1=" + player1 + "&player2=" + player2
}


	p0s = getURLvar("p0score");
	p1s = getURLvar("p1score");
	
	if (p0s > p1s) {
		winner =  getURLvar("player0");
		winnerchar =  getURLvar("p0pict");
		winnerid=0;
	} else {
		winner =  getURLvar("player1");
		winnerchar =  getURLvar("p1pict");
		winnerid=1;
	}
	


</script>
