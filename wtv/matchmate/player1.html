<SCRIPT Language="JavaScript">

	mam = new game("mam");

	function getURLvar(Name) {
		var search = Name + "=";
		var incoming = window.location.search;
		if (incoming.length > 0) { // if there are any search parameters
			offset = incoming.indexOf(search) ;
			if (offset != -1) { // if parameter exists 
				offset += search.length ;
				// set index of beginning of value
				end = incoming.indexOf("&", offset) ;
				// set index of end of cookie value
				if (end == -1) 
					end = incoming.length;
				value = unescape(incoming.substring(offset, end));
				if (value == "") {
					return null;
				} else {
					return value;
				}
			}
			else return null;
		}
		else return null;
	}
	
	function StartUp() {
		document.form1.playerpick.value = mam.players[0].name + ", pick a player!";
		window.status= mam.players[0].name + ", pick a player!";
	}

// GAME Object  new game(theme elements)
	function game(name) {
		this.name = name;
		this.status = null;
		this.players = new Array ();
		this.playerpicts = LoadPlayerPicts();
		this.addplayer = AddPlayer;
		this.renderSidebar = RenderSidebar;
		this.setup = SetupGame;
		this.nextpage = PassQueryToPage;
		this.pickCharacter = PickCharacter;
		this.setup();		

	}
		
// GAME Methods


	function PickCharacter(imageName,loc) {

		if (imageName == this.players[0].imageName) {
			return;
		}
		if (null != this.players[1].imageName) {
			return;
		}
		this.currentPlayer.setimage(imageName,loc);
		next = this.currentPlayer.id +1;
		if ( next < 2) {
			this.currentPlayer = this.players[this.currentPlayer.id +1];
			document.form1.playerpick.value = mam.players[this.currentPlayer.id].name + ", pick a player!";
			window.status= mam.players[this.currentPlayer.id].name + ", pick a player!";
		}
		else {
			document.form1.playerpick.value = "Building the village!";
			window.status= "Building the village!";
			setTimeout("GoNextPage()",1000);
		}
	}		

	function GoNextPage() {
		 PassQueryToPage('game.html');
	}
	
	function SetupGame() {  // called when GAME object constructed...

	// LOAD Players
		Aplayer = getURLvar ("player0");
		if ( Aplayer != null) {
			this.addplayer(unescape(Aplayer));
		}
		
		else {
			this.addplayer("You");
		}

		Aplayer = getURLvar ("player1");
		if (Aplayer != null) {
				this.addplayer(unescape(Aplayer));
		}
		
		Aplayer = getURLvar ("player2");
		if ( Aplayer != null) {
				this.addplayer(unescape(Aplayer));
		}

		this.currentPlayer = this.players[0]
	}
	
	function LoadPlayerPicts() {
		var playerpicts = new Array("images/char4_betty.gif","images/char2_musicman.gif","images/char1_thug.gif","images/char3_wilma.gif");
		return playerpicts;

	}
	
	function AddPlayer(name) {
		qty =this.players.length ;
		this.players[qty] = new Player(name, qty);
	}

	function RenderSidebar() {	
		this.players[0].render();
		document.write("<IMG width=8 height=2 src=/wtv/ROMCache/spacer.gif><BR>");
		this.players[1].render();
	}	

		
// PLAYER Object

	function Player(name, id) {
		this.name = name;
		this.score = 0;
		this.id = id;
		this.imageName = null;
	// methods
		this.addpoints = Paddpoint;
		this.updatescore = Pupdatescore;
		this.render = Prender;
		this.setimage = Psetimage;
	}

// PLAYER methods

	function Paddpoint(points) {
		this.score += points;
		this.updatescore();
	}

	function Pupdatescore() {
		document.scoreboard["player"+	this.id+"score"].value = this.score;
	}

	function Prender() { // Does need to be in its own table...Indicator is the Current Player Arrow

		document.write("<table border=0 cellpadding=0 cellspacing=0 cellborder=0>");
		document.write("<tr><td width=13></td><td width=125 height=83 background=images/player" + this.id + "_bg_on.gif valign=bottom align=center><img src=/ROMCache/spacer.gif name=play" + this.id + "pict width=80 height=80></td></tr>");
		document.write("<tr><td colspan=2 height=21 bgcolor=000000 align=center valign=bottom><FONT SIZE=2>"+this.name + "</FONT></td></tr></table><br>");
	}
	
	function Psetimage (imageName,loc) {
		loc = "pict" + loc;
		this.imageName = imageName;
		leftimage = "play" + this.id + "pict";
		document.images[leftimage].src = this.imageName;
		document.images[loc].src = "/wtv/RomCache/spacer.gif";
	}
	
	function PassQueryToPage(pageName) {
		var mysearch = window.location.search;
		var modifier = "N";
		if (mysearch != "") {
			modifier= "&";
			if (mysearch.charAt(0) != "?")
				mysearch = "?"+ mysearch;    
		}
		else
		{
			modifier = "?"
			mysearch = ""
		}

		var bigwoofie = pageName +  mysearch  + modifier ;
		bigwoofie = bigwoofie + "player0pict=" + mam.players[0].imageName +"&player1pict=" + mam.players[1].imageName;
		bigwoofie = bigwoofie +"&the=end" ;
		window.location = bigwoofie;
	}

	function Redirect(sURL) {
	  window.location=sURL;
	} 

</script>
