	<TITLE>WebTV Arcade</TITLE>
	
	<SCRIPT Language="JavaScript">
	var currentGame=0
	
	games = new Array("matchmate","spacerace","wordfind", "triviatask", "minesweeper", "crossword")
	urls = new Array("../matchmate/webtvpresents.html",
					"../aspacerace/webtvpresents.html",
					"../wordfind/webtvpresents.html",
					"../trivia/navmap/index.html",
					"../minesweeper/webtvpresents.html",
					"../crossword/navmap/index.html")
					
	logos = new Array()
	
	function Start() {
		LoadImages()
		document.images["game"].src = games[0] + ".gif"
		document.myform.total.value = games.length
		document.myform.current.value = 1
	
//		PlaySound(document.teen)
	}
	
	function LoadImages() {
		for (i=0; i< games.length; i++) {
			woofie = new Image()
			logos[i]= woofie
			logos[i].src = games[i] + ".gif"
			
		}
	}
	
  	function GoPlay() {
		window.location= urls[currentGame]
	}
	
	function ResumeBG() {
		PauseSound(document.teen)
	}
	
	function GoForward() {
//		alert(1)
//		PauseSound(document.teen)
//		alert(1)
		PlaySound(document.bell)
//		alert(1)
//		setTimeout("ResumeBG()", 3000)
		currentGame++
		if (currentGame >= games.length) currentGame=0
		document.images["game"].src = games[currentGame] + ".gif"

		document.myform.current.value = currentGame +1 
//		setTimeout("GoForward()",3000)
	}

	function GoBackward() {
		PlaySound(document.bell)
		currentGame--
		if (currentGame < 0 ) currentGame= games.length -1 
		document.images["game"].src = games[currentGame] + ".gif"

		document.myform.current.value = currentGame +1

	}
	

	function PlaySound(sound) {

		if (sound == null) {  
            return;
		}
		else {
			sound.play(false);
		}
	}
	function PauseSound(sound) {

		if (sound == null) {  
            return;
		}
		else {
			sound.pause();
		}
	}
	</SCRIPT>
