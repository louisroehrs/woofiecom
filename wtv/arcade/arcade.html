	  <TITLE>WebTV Arcade</TITLE>

	  <SCRIPT Language="JavaScript">

      var currentGame=0
	    
	    games = new Array("matchmate","spacerace","wordfind", "triviatask", "minesweeper", "crossword")
      
      urls = new Array(
        "../matchmate/index.html",
			  "../aspacerace/index.html", // This one does not matter, the flash always loads index.html.
			  "../wordfind/index.html",
			  "../trivia/navmap/index.html",
			  "../minesweeper/index.html",
			  "../crossword/navmap/index.html")
      
      flyinFlash = new Array(
        "../matchmate/flash/jestorlink.spl",
        "../aspacerace/flash/flyintologo2.spl",
        "../wordfind/flash/wordfind.spl",
        "none",
        "../minesweeper/flash/Mine.spl",
        "none"
      );
      
      flyinAudio = new Array(
        "audio/littsong.mp3",
        "audio/Tasmin Archer - Sleeping Satellite_second.mp3#t=9",
        "audio/1NewLang.mp3",
        "none",
        "audio/chase2.mp3",
        "none"
      );
      
      gameTitles = new Array(
        "MatchMate","SpaceRace","WordFinder","Trivia Task","Minesweeper","Crossword"
      );
      
	    logos = new Array()
      
      
	    function Start() {
		    LoadImages()
		    document.images["game"].src = games[0] + ".gif"
		    document.myform.total.value = games.length
		    document.myform.current.value = 1
	    }
	    
	    function LoadImages() {
		    for (i=0; i< games.length; i++) {
			    woofie = new Image()
			    logos[i]= woofie
			    logos[i].src = games[i] + ".gif"
			    
		    }
	    }
	    
      function Next() {
  	    window.location = urls[ currentGame] ;
      }
      
      function GoPlay() {
        const arcade = document.getElementById("arcade");
        const wtvpresentsvideo = document.getElementById("wtvpresentsvideo");
        const wtvpresentsdiv = document.getElementById("wtvpresents");
        const audioP = document.getElementById("wtvaudio")
        const footerTitle= document.getElementById("footerstatus");
        footerTitle.innerText = "WebTV " + gameTitles[currentGame];
        wtvpresentsdiv.style.display = "block";
        wtvpresentsvideo.play();
        arcade.style.display="none";
        audioP.play();
        duration = 3000;
        stopAudio = () => audioP.pause();
        stopVideo = () => wtvpresents.pause();
        window.setTimeout(PlayFlyin,duration);
        window.setTimeout(stopAudio,duration);
        window.setTimeout(stopVideo,duration);
      }

      function PlayFlyin() {
        arcade.style.display="none";
        if (flyinFlash[currentGame] =="none") {
          Next()
          return;
        }
        const wtvpresents = document.getElementById("wtvpresents");
        const flyin = document.getElementById("flyin");
        flyin.style.display="block";
        wtvpresents.style.display="none";
        const audioP = document.getElementById("flyinaudio" + games[currentGame]);
        window.RufflePlayer = window.RufflePlayer || {};
        window.RufflePlayer.config = {
          "autoplay" : "on",
          "splashScreen": false, 
          "unmuteOverlay":"hidden",
          "allowScriptAccess":true, // true loads next page, false, stays on page.,
        };
        const ruffle = window.RufflePlayer.newest();
        const player = ruffle.createPlayer();
        flyin.appendChild(player);
        player.ruffle().load(flyinFlash[currentGame]);
        audioP.play();
      }

      function ResumeBG() {
        //		PauseSound(document.teen)
	    }

      function GoForward() {
		    currentGame++
		    if (currentGame >= games.length) currentGame=0
		    document.images["game"].src = games[currentGame] + ".gif"

        document.myform.current.value = currentGame +1
        const audioP = document.getElementById("audiobutton");
        audioP.currentTime = 0;
        audioP.play();  
        //		setTimeout("GoForward()",3000)
	    }

	    function GoBackward() {
		    currentGame--
		    if (currentGame < 0 ) currentGame= games.length -1 
		    document.images["game"].src = games[currentGame] + ".gif"
		    document.myform.current.value = currentGame +1

        const audioP = document.getElementById("audiobutton");
        audioP.currentTime = 0;
        audioP.play();  
	    }
	    
      window.RufflePlayer = window.RufflePlayer || {}
      window.RufflePlayer.config = {
        "autoplay" : "off",
        "splashScreen": false, 
        "unmuteOverlay":"hidden",
        "allowScriptAccess":false,
        "unmuteOverlay":"hidden",
        "frameRate":9
      };

	  </SCRIPT>
