function Event (name) {
  this.name = name;
  this.length = 0;
  this.funcs = 0;
  this.func = new Object();
  this.monitor = EventMonitor;
  this.unmonitor = EventUnmonitor;
  this.signal = EventSignal;
  this.flush = EventFlush;
}
function EventMonitor (func) {
  for (var i = 0; i < this.length; i++)
    if (this.func[i] == null) {
      this.func[i] = func;
      break;
    }
  if (i >= this.length)
    this.func[this.length++] = func;
  this.funcs++;
}
function EventUnmonitor (func) {
  for (var i = 0; i < this.length; i++)
    if (this.func[i] == func) {
      this.func[i] = null;
      this.funcs--;
    }
}
function EventSignal (p1,p2,p3) {
  for (var i = 0; i < this.length; i++)
    if (this.func[i] != null)
      this.func[i](this,p1,p2,p3);
}
function EventFlush () {
  for (var i = 0; i < this.length; i++)
    this.func[i] = null;
}
function bstring () {
  var argv = bstring.arguments;
  var argc = argv.length;
  this.elems = argc;
  this.elem = new Object();
  for (var i = 0; i < argc; i++)
    this.elem[i] = argv[i];
  this.append = bstringAppend;
  this.del = bstringDelete;
  this.buildString = bstringBuildString;
  this.toString = bstringToString;
}
function bstringAppend () {
  var argv = bstringAppend.arguments;
  var argc = argv.length;
  for (var i = 0; i < argc; i++)
    this.elem[this.elems++] = argv[i];
}
function bstringDelete (n){
  this.elems--;
  for (var i=n; i < this.elems; i++)
    this.elem[i] = this.elem[i+1];
  this.elem[this.elems] = null;
}
function bstringBuildString (left,right) {
  if (left == right)
    return this.elem[left];
  var mid = (left+right)>>1;
  return this.buildString(left,mid) + this.buildString(mid+1,right);
}
function bstringToString () {
  return this.buildString(0,this.elems-1);
}
function array () {
  var argv = array.arguments;
  var argc = argv.length;
  for (var i=0; i < argc; i++)

  this.source = source;
  this.url = url;
  this.userdef = userdef;
  if (source == "")
    this.name = "No image";
  else
    this.name = source+": "+url.substring(url.lastIndexOf("/",url.length)+1,url.length);
}
function packTextures() {
  var p = new bstring();
  for (var i=0; i < textures.elems; i++)
    if(textures.elem[i].userdef)
      p.append(textures.elem[i].source,"=",textures.elem[i].url,";")
  return ((p.elems>0)?p.toString():"");
}
function unpackTextures (str) {
  var i=0,j=0;
  while (i < str.length) {
    j = str.indexOf("=",i);
    var source = str.substring(i,j++);
    i = str.indexOf (";",j);
    var url = str.substring(j,i++);
    textures.append(new Texture(source,url,true));
  }  
}

function setColor (r,g,b) {
  if (color > 4) return;
  var c = colors[color];
  if (r >= 0) c.r = r;
  if (g >= 0) c.g = g;
  if (b >= 0) c.b = b;
  evcolor.signal(c);
}
function changeColor (r,g,b) {
  if (color > 4) return;
  var c = colors[color];
  if ((c.r += r) < 0) c.r = 0;
  if (c.r > 255) c.r = 255;
  if ((c.g += g) < 0) c.g = 0;
  if (c.g > 255) c.g = 255;
  if ((c.b += b) < 0) c.b = 0;
  if (c.b > 255) c.b = 255;
  evcolor.signal(c);
}

  areatag(d,0,10,10,19,"","cc.changeColorType(1)");
  d.writeln('</map>');

function phgensites(d) {
 d.writeln('<select onchange="setsite(this.selectedIndex)">');

  d.writeln('<option',((i==site)?' selected':''),'>',sites[i].type,sites[i].name);
 d.writeln('</select>');
}
function phgennums(d) {
 d.writeln('<select name=num onchange="cc.setNumType(this.selectedIndex)">');
 for(var i=0;i<numTypes.length;i++)
  d.writeln('<option',((i==numType)?' selected':''),'>',numTypes[i]);
 d.writeln('</select>'); 
}
function phgencols(d) {
 d.writeln('<select name=col onchange="cc.setColorType(this.selectedIndex)">');
 for(var i=0;i<colorTypes.length;i++)
  d.writeln('<option',((i==color)?' selected':''),'>',colorTypes[i]);
 d.writeln('</select>'); 
}

 else phdoc.f.num.selectedIndex=n;

function setloc (fm,loc) {
  if(nav3)eval(fm+'.location.replace("javascript:parent.'+loc+'")');
  else if(ie3)eval(fm+'.location="javascript:parent.'+loc+'"');
  else setTimeout(fm+'.location="javascript:parent.'+loc+'"',0);
}
function seturl (fm,url) {
//  if(nav3)eval(fm+'.location.replace("'+url+'")'); // Wierd JS bug: new doc inherits onload/onunload
  if(nav3)eval(fm+'.location="'+url+'"');
  else if(ie3)eval(fm+'.location="'+url+'"');
  else setTimeout(fm+'.location="'+url+'"',0);
}
function load() {
  restoreTextures();
  setloc("self.head","fHead");
  setloc("self.htool","fPHTool");
  setloc("self.client","fPFset");
