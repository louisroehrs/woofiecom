<html>
<body>

<SCRIPT LANGAUGE="JavaScript">

   var nImages=2;
   var aImageURLs = new Array(
		"http://www.mtbinfo.com/graphics/images/logo.gif",
		"http://www.mtbinfo.com/graphics/TABS/tabs.gif"
                             );

   var aAnchorURLs = new Array(
		"http://www.mtbinfo.com/",
		"http://www.news.com/"
                             );

   var iCurrImage=0;
   var iFlipPeriod=3000;

   function OnClick() {
  
     window.location = aAnchorURLs[iCurrImage];
 
   }

   function flipImage() {

      iCurrImage = (iCurrImage + 1) % nImages;
      dispImage();
      iTimeOutID = window.setTimeout("flipImage()", iFlipPeriod);

   }

   function dispImage(iImage) {

      document.rotator.src = aImageURLs[iImage];

   }

   iTimeOutID = window.setTimeout("flipImage()", iFlipPeriod);
 
   function onMouseOver(iButtonNum) {
      
      clearTimeOut(iTimeOutID);
      iCurrImage = iButtonNum;
      dispImage(iCurrImage)
	
   }

   function onMouseOut(iButtonNum) {

     flipImage();

   }

</SCRIPT>

<a name=rotatoranchor href="javascript:OnClick()">
<img width=40 height=40 src="image0.gif" 
     name=rotator>
</a>

     name=rotator>
