<SCRIPT LANGUAGE="JavaScript">



   var nImages=4;

   var aImageURLs = new Array(

		"graphics/rollingstone.jpg",

		"graphics/sonicnet.jpg",

		"graphics/eonline.jpg",

		"graphics/musicblvd.jpg"

                             );



   var aAnchorURLs = new Array(

						"http://www.rollingstone.com",

						"http://www.sonicnet.com",

						"http://www.eonline.com",

						"http://www.musicblvd.com"

							  );



   var iCurrImage    = -1;

   var iOldImage     = -1;

   var iFlipPeriod   = 5000;

   var iTimeOutID    = 0;



   var sImages = new Array(

            "graphics/but_rollingstone0.gif",

	        "graphics/but_sonicnet0.gif",

	        "graphics/but_eonline0.gif",

	        "graphics/but_musicblvd0.gif",

	        "graphics/but_rollingstone1.gif",

	        "graphics/but_sonicnet1.gif",

	        "graphics/but_eonline1.gif",

	        "graphics/but_musicblvd1.gif",

	        "graphics/rollingstone.jpg",

            "graphics/sonicnet.jpg",

            "graphics/eonline.jpg",

            "graphics/musicblvd.jpg"

            			);



   function OnClick() {



     window.location = aAnchorURLs[iCurrImage];



   }



   function loadImages() {



      var aImages = new Array();



	  for (i=0; i < sImages.length; i++) {

	     aImages[i] = new Image();

	     aImages[i].src = sImages[i];

	  }



	  for (i=0; i < 8; i++) {

	     if (!(aImages[i].complete)) {

		   i=0;  // Try again if image is not loaded.

		 }

	  }					// Spin until image loading	is complete.
													 

   }



   function flipImage() {



      iCurrImage = (iCurrImage + 1) % nImages;

      dispImage(iCurrImage);

	  triggerTimer();



   }



   function dispImage(iImage) {



      //alert("dispImage "+iOldImage+" "+iImage);



	  if (eval(iOldImage) != -1) {

	    if (eval(iOldImage) == 0) {

		 // alert("b0 undo");

		  document.button0.src = "graphics/but_rollingstone0.gif";

		}

	    if (eval(iOldImage) == 1) {

		  document.button1.src = "graphics/but_sonicnet0.gif";

		}

	    if (eval(iOldImage) == 2) {

		  document.button2.src = "graphics/but_eonline0.gif";

		}

		if (eval(iOldImage) == 3) {

  	      document.button3.src = "graphics/but_musicblvd0.gif";

		}

	  }



      document.rotator.src = aImageURLs[iImage];

  	  iOldImage = iImage;



      if (eval(iImage) == 0) {

	    // alert("b0 do");

  	    document.button0.src = "graphics/but_rollingstone1.gif";

	  }

	  if (eval(iImage) == 1) {

	    document.button1.src = "graphics/but_sonicnet1.gif";

	  }

	  if (eval(iImage) == 2) {

	    document.button2.src = "graphics/but_eonline1.gif";

	  }

	  if (eval(iImage) == 3) {

  	    document.button3.src = "graphics/but_musicblvd1.gif";

	  }



	  iCurrImage = iImage;



   }



   function onMouseOverSelector(iButtonNum) {



      dispImage(iButtonNum);

	  cancelTimer();



   }



   function cancelTimer() {



	 window.clearTimeout(iTimeOutID);



   }



   function triggerTimer() {



     iTimeOutID = window.setTimeout("flipImage()", iFlipPeriod);



   }



   function onMouseOutSelector(iButtonNum) {



	 triggerTimer();



   }



   function onMouseOverImage() {



	 onMouseOverSelector(iCurrImage);



   }



   function onMouseOutImage() {



	 triggerTimer();



   }



   function startProg() {



	 loadImages();

	 flipImage();



   }



</SCRIPT>
