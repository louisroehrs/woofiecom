<SCRIPT Language="JavaScript">
	mam = new game("mam")
	
	function getURLvar(Name) {
		var search = Name + "="
		var incoming = window.location.search
		if (incoming.length > 0) { // if there are any search parameters
			offset = incoming.indexOf(search) 
			if (offset != -1) { // if parameter exists 
				offset += search.length 
				// set index of beginning of value
				end = incoming.indexOf("&", offset) 
				// set index of end of cookie value
				if (end == -1) 
					end = incoming.length
				value = unescape(incoming.substring(offset, end))
				if (value == "") {
					return null
				} else {
					return value
				}
			}
			else return null
		}
		else return null
	}
	
	function StartUp() {
		document.form1.playerpick.value = mam.players[0].name + ", Pick a player!"
	}

// GAME Object  new game(theme elements)

		this.name = name

		this.addplayer = AddPlayer
		this.renderSidebar = RenderSidebar
		this.setup = SetupGame
		this.onePlayerScoreboard = OnePlayerScoreboard
		this.multiPlayerScoreboard = MultiPlayerScoreboard
		this.renderRules = RenderRules
		this.singlePlayerRules = SinglePlayerRules
		this.multiPlayerRules = MultiplayerRules
		this.startRules = StartRules
		this.renderPlayerPicts = RenderPlayerPicts
		this.nextpage = PassQueryToPage
		this.pickCharacter = PickCharacter
	
		this.setup()		

	}

		document.write("			</td>");
		document.write("		</tr>");

	}

	function PickCharacter(imageName,loc) {

		if (imageName == this.players[0].imageName) {
			return
		}
		if (null != this.players[1].imageName) {
			return
		}
	//	loc = (loc + 1) % 4
		
	//	linkloc = 3 + loc
	//		alert (linkloc)
	//	document.links[linkloc].select()
		this.currentPlayer.setimage(imageName,loc)
		next = this.currentPlayer.id +1
		if ( next< this.players.length) {
			this.currentPlayer = this.players[this.currentPlayer.id +1]
			document.form1.playerpick.value = mam.players[this.currentPlayer.id].name + ", Pick a player!"
		}
		else {
			 setTimeout("GoNextPage()",1000)
		}
	}		

	function GoNextPage() {
		 PassQueryToPage('game.html')

	function SetupGame() {  // called when GAME object constructed...

	// LOAD Players
		Aplayer = getURLvar ("player0")
		if ( Aplayer != null) {
			this.addplayer(unescape(Aplayer))
		}
		
		else {
			this.addplayer("You")
		}

		}
		
		Aplayer = getURLvar ("player2")

		}

	}

		}
		document.write("</TABLE>");
	}

		else

	}

		document.write("");
		document.write("<BR><BR>");
		document.write("Good Luck!");
		document.write("</FONT>");
	}
	
	function MultiplayerRules() {

		document.write(" another match.  Continue until the board is cleared.");
		document.write("<BR><BR>");
		document.write("Good Luck!");
		document.write("</FONT>");
		}

		function StartRules() {
		//	window.status= this.players[0].name + ", pick one!"

// PLAYER Object

	function Player(name, id) {
		this.name = name
		this.score = 0
		this.id = id
		this.imageName = null
	// methods
		this.addpoints = Paddpoint
		this.updatescore = Pupdatescore
		this.render = Prender
		this.setimage = Psetimage
	}

// PLAYER methods

	function Paddpoint(points) {
		this.score += points;
		this.updatescore()
	}

	function Pupdatescore() {
		document.scoreboard["player"+	this.id+"score"].value = this.score
	}

	function Prender (myheight,indicator) { // Does need to be in its own table...Indicator is the Current Player Arrow
		document.write("<tr>");
		if (indicator) {
			document.write("<TD valign=middle><img src=images/spacer.gif width=10 height=40 name=player" + this.id+ "go></TD>");
		}
		else document.write("<TD valign=middle><img src=images/spacer.gif width=1 height=40 name=player" + this.id+ "go></TD>");
		document.write("<TD align=center valign=middle width=100%><FONT color=#FFFF00 SIZE=2><shadow><STRONG>"+this.name + "</STRONG></shadow></FONT></TD>");
		//document.write("<TD align=left absheight=" + myheight + " valign=middle><FONT SIZE=2><STRONG><input noselect type=text name=player"+this.id+"score value="+ this.score + " size=5 bgcolor=#595775 usestyle border=0></STRONG></FONT></TD>");
		document.write("</TR>");
	}
	
	function Psetimage (imageName,loc) {
		loc = "pict" + loc
		this.imageName = imageName;
		leftimage = "play" + this.id + "pict"
		document.images[leftimage].src = this.imageName;
		document.images[loc].src = "images/spacer.gif";
	}
	
	function PassQueryToPage(pageName) {
		var mysearch = window.location.search
		var modifier = "N"
		if (mysearch != "") {
			modifier= "&"
			if (mysearch.charAt(0) != "?")
				mysearch = "?"+ mysearch;    
		}
		else
		{
			modifier = "?"
			mysearch = ""
		}

		var bigwoofie = pageName +  mysearch  + modifier ;
		bigwoofie = bigwoofie + "player0pict=" + mam.players[0].imageName +"&player1pict=" + mam.players[1].imageName;
		bigwoofie = bigwoofie +"&the=end" ;
		window.location = bigwoofie
	}

	function Redirect(sURL) {
	  window.location=sURL;
	} 

</script>
