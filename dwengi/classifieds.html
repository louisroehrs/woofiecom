function element(objName, name, location, modified)
{

  this.location = location;
  this.modified = modified; //new Date(modified)

  this.draw = draw;
  this.drawmain = drawmain;
  this.drawmainkids = drawmainkids;
  this.rcat = rcat;
  this.addattr = addattribute;
}

function attribute(objName, name, uiType, valType)
{
    this.objName = objName;
    this.name = name;
    this.attribute = null;
    this.uiType = uiType;
    this.valType = valType;
    this.draw = rdrawattr;
    this.addattr = addattribute;
}


function addattribute(item)
{
  if (this.attribute != null)
  {
    this.attribute.addattr(item);
  }
  else
  {
    this.attribute = item;
  }

}

function rdrawattr()

function addPeer(item)
{
  if (this.nextPeer != null)
  {
    this.nextPeer.addPeer(item);
  }
  else
  {
    this.nextPeer = item;
  }
  item.parent = this.parent;
}

function addKid(item)
{
  if (this.kid != null)
  {
    this.kid.addPeer(item);
  }
  else
  {
    this.kid = item;
  }
  item.parent = this;
}

function open(item) {

    }

}

function close (item) {
    if (root ==null) {

function draw()
{
  if (this.kid == null) {
    print("\n<DT><IMG SRC='images/bul.gif' HEIGHT = 10 WIDTH = 20>");
    if (this.location != null) {
      print("<A HREF ='javascript:top.docdrawobj( \"" + this.objName + "\" ) ' >" + this.name + "</A>");
         }
      else {
        print(this.name);
        }
    if (this.nextPeer != null) {
      this.nextPeer.draw();
      }    
      else {
        print("</DL>");
        return;
        }
    }
    else {
      if (this.open) {
        print("\n<DT><A HREF='javascript:" + chk + "top.close(top." + this.objName+ ");top.redraw()}'>");
        print("<IMG SRC='images/minus.gif' HEIGHT = 15 WIDTH = 30 BORDER = 0></A>");
        if (this.location != null) {
          print("<A HREF ='javascript:top.docdrawobj( \"" + this.objName + "\" ) '>" + this.name + "</A> <DL>");
          }
          else {
            print(this.name+"<DL>");
            }
        this.kid.draw()
        if (this.nextPeer != null) {
          this.nextPeer.draw();
        }    
        else {
          print("</DL>");
          }
      }
      else {
        print("\n<DT><A HREF='javascript:" + chk + "top.open(top."+ this.objName + ");top.redraw()}'>");
        print("<IMG SRC='images/plus.gif' HEIGHT = 15 WIDTH = 30 BORDER = 0></A>");
        if (this.location != null) {
          print("<A HREF ='javascript:top.docdrawobj( \""  + this.objName + "\" );"+chk+"top.open(top."+ this.objName + ");top.redraw()}'>" + this.name + "</A>");
          }
          else {
            print(this.name);
            }
        if (this.nextPeer != null) {
          this.nextPeer.draw();
        }    
        else {
          print("</DL>");
          }
      }
    }
}

function resolvecat(objName)
{
   // 	top.debug.document.open();
    	return top.root.rcat(objName);
}

function rcat(objName) {

  if (this.objName == objName) {
   // 	top.debug.document.write("Returning:" +  this.name + "\n");
    	return this;
    }
  else {

    if (this.kid != null)  {
   // 	top.debug.document.write("Entering Kid:" +  this.kid.name +"\n");
    	if (null != (real = this.kid.rcat(objName))) {
    	    return real ;
    	}
    }

    if (this.nextPeer != null) {
    //	top.debug.document.write("Entering Peer:" + this.nextPeer.name + "\n");
    	return this.nextPeer.rcat(objName);
    }
    return null;
  }
}

function docdrawobj(objName)
{
<!-- navigator.appVersion.lastIndexOf('Win') == -1 && navigator.appVersion.lastIndexOf('2.0') == -1-->
	if (true) {
		top.right.location = (resolvecat(objName)).location;
   }
}

function ddo(obj)
{

    if (obj == null) {
    	top.right.document.write("no objects\n");
    }
    if (obj.parent != null) {
    	ddo(obj.parent);
    }
    top.right.document.write("<a HREF='javascript:top.addsubform( \"" +obj.objName + "\" )'><IMG SRC='images/addsub.gif' border=0 align=right></a> ");
    top.right.document.write("<a HREF='javascript:top.addattrform( \"" +obj.objName + "\" )'><IMG SRC='images/addattr.gif' border=0 align=right></a> ");

    top.right.document.write("<h1>" + obj.name + "</h1>\n");
    if (obj.attribute != null) {
    drawattr(obj);
    }

}
