This example shows how you can create charts with SVG and VML. Drawn while you wait by the client in antialiased beauty.  Enter four values and the chart will draw their relevance to the sum.
<v:oval id=piechart style='position:absolute;visibility:visible;top:400;left: 200;width:250;height:250;opacity:0.5;strokecolor:black; fill:true; fill-color:white; print:true; strokeweight:3pt; coordsize:1000 1000;'><v:shadow on=true opacity= "0.5" offset="10px,10px" Color = "grey"/>
 <v:fill opacity2="0.5" color="red"/>
</v:oval>

</v:shape>

<v:shape id=piechartarc3
         style='position:absolute;visibility:visible;top:400;left:200;width:250;height:250;'
		strokecolor="blue" 
		fill="true"

		print="true"

		coordsize="1000 1000"

        <v:path id=mypath3 v="m 500,500 x e"/>
        <v:shadow on=false opacity= "0.5" offset="10px,10px" Color = "grey"/>
</v:shape>

<form name=myform id=myform>
<input type=text name=a value=37.0><BR>
<input name=b  type=text value=28.0><BR>
<input name=c  type=text value=20.0><BR>
<input name=d  type=text value=15.0><BR>
<input name=e  type=hidden size=80 value=15.0><BR>
<input name=e  type=button value='chart!' onclick='javascript:drawpie()'><BR>

</form>

<script language=javascript>

var start = 0;
var pi =3.1415296;

function drawslice(percent,stop) {
   var path = "";
   end = (stop=="1")? 100:start + percent+0.0;
   for (i= start; i <= end; i++) {
      x = Math.floor((Math.sin(i*pi/50)*500)+500);
      y = Math.floor((Math.cos(i*pi/50)*500)+500);
      xs = x.toString();
      ys = y.toString();
      path +=  xs + ", " + ys + ", ";
   }
//      document.writeln(path,"<BR>");
   start = Math.floor(end) ;
   return "m 500,500 l "+path+ " 500,500 x e";
}
function drawpie() {
   start = 0;
   a = document.all.myform.a.value *1.0;
   b = document.all.myform.b.value *1.0;
   c = document.all.myform.c.value *1.0;
   d = document.all.myform.d.value *1.0;

   sum = a + b + c + d;
   document.all.myform.e.value = "a"+a +"b"+b +"c"+ c +"d"+d +"sum"+sum;
   a =a*100/sum;
   b =b*100/sum;
   c =c*100/sum;
   d =d*100/sum;

   document.all.mypath1.v = drawslice(a);
   document.all.mypath3.v = drawslice(b);
   document.all.mypath4.v = drawslice(c);
   document.all.mypath2.v = drawslice(d,1);
}

document.all.mypath1.v = drawslice(37.0);
document.all.mypath3.v = drawslice(28.0);
document.all.mypath4.v = drawslice(20.1);
document.all.mypath2.v = drawslice(15.0);

//document.writeln("mypath");

</script>
