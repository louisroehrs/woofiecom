<script language=JavaScript>

function woof(event) {
   alert('#woof');
}

</script>
<style>
#woof {
   border:1px solid red;
   height:200px;
}
.d {position:relative;
   top: 50%;
   margin-top:-20px;
   border:1px solid blue;
   height:40px;
}
.e { border: 1px solid green; position:absolute;top:25%;left:50%;clip: rect(0px 10px 10px 0px)}
body {margin:0;padding:0}
#page {min-height:100%;border:1px solid #ef0};
</style>
  </head>

  <body>
<div id=page>
    <h1 id=h1 xonclick="h1()">Jquery</h1>
<div id="woof" xonclick='woof()'><div class=d>center<div class=e>d e</div></div></div>
<div>
<script language=JavaScript>


function init() {
      $("body").click(function(){alert("body")});
      $("#woof").click(function(evt){alert("#woof");window.event.cancelBubble=true;evt.stopPropagation()});
      $("h1").click(function(){alert(3)});
}

</script>
