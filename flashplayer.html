<script>
var rufflePlayer = null;

function loadSelected() {
  var sel = document.getElementById('flashSelect');
  var url = sel.value;
  if (!url) return;

  var statusMsg = document.getElementById('statusMsg');
  var nowPlaying = document.getElementById('nowPlaying');
  var container = document.getElementById('ruffleContainer');

  // Remove existing player
  container.innerHTML = '';

  var ruffle = window.RufflePlayer.newest();
  rufflePlayer = ruffle.createPlayer();
  rufflePlayer.style.width = '480px';
  rufflePlayer.style.height = '360px';
  container.appendChild(rufflePlayer);

  rufflePlayer.load({ url: url, autoplay: 'on' });

  statusMsg.textContent = '';
  nowPlaying.textContent = 'Now playing: ' + url;
}

// Load on double-click in the list too
document.getElementById('flashSelect').addEventListener('dblclick', loadSelected);
</script>
