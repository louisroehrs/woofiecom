	var playerqty = getURLvar("players")

	width = getURLvar("width")

// *************** GET VARIABLES ****************

	function getURLvar(Name) {
		var search = Name + "="
		var incoming = window.location.search
		if (incoming.length > 0) { // if there are any search parameters
			offset = incoming.indexOf(search) 
			if (offset != -1) { // if parameter exists 
				offset += search.length 
				// set index of beginning of value
				end = incoming.indexOf(";", offset) 
				// set index of end of cookie value
				if (end == -1) 
					end = incoming.length
				return unescape(incoming.substring(offset, end))
			}
		}
	}

	puzzle = new Array("0","2","4","6","4","7","3","6","0","7","5","5","2","1","1","3","8","9","8","9","0","0","0","0","0","2","4","6","4","7","3","6","0","7","5","5","2","1","1","3","8","9","8","9","0","0","0","0","0","2","4","6","4","7","3","6","0","7","5","5","2","1","1","3","8","9","8","9","0","0","0","0","0","2","4","6","4","7","3","6","0","7","5","5","2","1","1","3","8","9","8","9","0","0","0","0","0","2","4","6","4","7","3","6","0","7","5","5","2","1","1","3","8","9","8","9","0","0","0","0","0","2","4","6","4","7","3","6","0","7","5","5","2","1","1","3","8","9","8","9","0","0","0","0","0","2","4","6","4","7","3","6","0","7","5","5","2","1","1","3","8","9","8","9","0","0","0","0","0","2","4","6","4","7","3","6","0","7","5","5","2","1","1","3","8","9","8","9","0","0","0","0","0");

// OBJECTS

// GAME Object  new game(theme elements)
	function game(name, sGameDir, sGameTitle, asImageNames, kWidth, kHeight, cellWidth, cellHeight, iSecondsLeft, playerqty) {
	
		this.name = name
		this.title = sGameTitle
		this.directory = sGameDir
		this.imageNames = asImageNames

		this.timeLimit = iSecondsLeft
		this.players = new Array ()
		this.currentPlayer = null
		this.clock1 = new Clock(this, "clock1", iSecondsLeft, "clock/")
		this.board = new gameboard(this, kWidth, kHeight, cellWidth, cellHeight)
		this.firstCell = null
		this.secondCell = null
		this.blockClicks = 0
		this.pointsSelected = 0;
		this.state = "inplay";
		this.BadMatchTimeoutID = 0;
		this.playerqty = playerqty;
 	
		             
		// Methods
		this.displaystatus = null
		this.score = Score
		this.addplayer = AddPlayer
		this.start = StartGame
		
		if (playerqty ==1)  {
			this.addplayer("woofie")
			this.currentPlayer= this.players[0]
			}
		else {
			for (i=0; i < playerqty; i++ ) {
				this.addplayer ( getURLvar ("player"+i));
			}
		}	
	}
		
// GAME Methods

		function StartGame () {  // called when all is loaded...
			this.clock1.increment()
		}
		function Score(points) {
			this.currentPlayer.addpoints(points)
		}

		function AddPlayer(name) {
			qty =this.players.length
			this.players[qty] = new Player(name, qty)
		}

// CELL Object

	function Cell(objName, game, contents, x,y, cellWidth, cellHeight) {
		if (objName == "") {
			objName = "Cell" + x + "at" + y
		}
		this.objName = objName
		this.contents = contents
		this.covered = 1
		this.game = game
	
		this.x = x
		this.y = y
		this.cellWidth = cellWidth
		this.cellHeight = cellHeight
		this.matched = false
	// methods
		this.cover = Cover
		this.uncover = Uncover
		this.matches = Matches
		this.select = SelectCell
		this.render = RenderCell
	}

// CELL methods  Keep pure except for SelectCell

	function Uncover() {
		document.images[this.objName].src = sGameDir + this.contents + ".gif";
		this.covered = 0;
	}
// 
	function RenderCell() {
		if (debug) alert("RenderCell");
		document.write("<td bgcolor=#a52929 ><a href='javascript:mam.board.cells["+ this.x + "][" + this.y + "].select()'><img transparency=0 src='images/flatcover.gif' border=0 name='" + this.objName + "' width="+ this.cellWidth+" height=" + this.cellHeight + "></a>");
		document.write("</td>");
	}

	function SelectCell() {
		
	//	if (this.game.gameState != "inplay")
	//		return;
	
		if  ((this.matched) || (!this.covered))
			return;

		if  ((this.game.blockClicks !=1) || (this.game.playerqty ==1)) {
			CallbackNoMatch()		// cover any previously uncovered cells (one player mode only)
			this.uncover();
				
			if (this.game.pointsSelected == 1) {
				this.game.pointsSelected = 0;
				if ( this.matches(this.game.firstCell) ) {
					this.matched = true;
					this.game.firstCell.matched = true;
					PlaySound(document.bell);
					this.game.score(100);
				}
				else {
					this.game.blockClicks =1
					this.game.secondCell = this
					this.game.needToCoverBadMatch = true;
					this.game.BadMatchTimeoutID = window.setTimeout("CallbackNoMatch()", 4000);
					PlaySound(document.buzzer);
				}
			}
			else {
			// cover up any unmatched uncovered previous move.
				
				this.game.pointsSelected =1;
				this.game.firstCell = this;
			}
		}		
	}
	
	function Matches(other) {
		if ( this.contents == other.contents ) {
			return 1; 
		}
		else {
			return 0;
		}
	}

	function Cover() {
		document.images[this.objName].src = "images/flatcover.gif";
		this.covered = 1;
	}

// PLAYER Object

	function Player(name, id) {
		this.name = name
		this.score = 0
		this.id = id
	// methods
		this.addpoints = Paddpoint
		this.display = Pdisplay
		this.updatescore = Pupdatescore
	}

// PLAYER methods

	function Paddpoint(points) {
		this.score += points;
		this.updatescore()
	}

	function Pupdatescore() {
		document.scoreboard["player"+	this.id+"score"].value = "Points: "+ this.score
	}
	
	function Pdisplay () {
		if (mode == multiple) {
			document.write(this.name+"<BR>");
		}
		document.write("<textarea size=16  name='Player" + this.id + "score >Points: 0</textarea><BR>");
	}

// GAMEBOARD Object  new gameboard(size)
	
	function gameboard (game, kWidth, kHeight, cellWidth, cellHeight) {
		this.kWidth = kWidth
		this.kHeight = kHeight
		this.cells = new Array(kHeight)
		//methods
		this.render = RenderGameBoard
		this.game = game
		
		// initialize
		for (i=0; i < kHeight; i++) {
			this.cells[i] = new Array(kWidth)
			for (j=0; j < kWidth; j++) {
				woofie = puzzle[i+j*kWidth]
				this.cells[i][j] = new Cell("", game, woofie, i,j, cellWidth, cellHeight)
		   }
		}
	}
	
//	GAMEBOARD methods
	
	function RenderTitle() {
		document.write("<font size='+5'>"+sGameTitle+"</font><BR>");
	}
	
	function RenderGameBoard() {
		if (debug) alert("gameboard render");
	 //
		document.write("<table bgcolor=#222222 transparency=0 border=5 cellspacing=6 cellpadding=0 >");

		for (i=0; i < this.kHeight; i++) {
			document.write("<tr>")
			for (j=0; j < this.kWidth; j++) {
				this.cells[i][j].render()
			}
			document.write("</tr>")
		}
		document.write("</table>");
	}
	
// CALLBACKS
	function CallbackNoMatch() {
		if ( mam.BadMatchTimeoutID != 0) {
			clearTimeout(mam.BadMatchTimeoutID)
			mam.BadMatchTimeoutID = 0
			mam.blockClicks = 0;
			mam.firstCell.cover();
			mam.secondCell.cover();
		}
	}
	
	function RandomLetter() {
		iLetterASCII = Math.round(Math.random()*25);
			return(sLetterLookup.charAt(iLetterASCII));
		}
	function LoadImages() {
		LoadClockImages();
	}


// CLOCK Object	 Countdown clock: All units in seconds
	function Clock (game, name, iSeconds,imageroot) {
		this.game = game
		this.name = name          // Image name is [name][1|10]min[digit] for HTML location.
		this.time = iSeconds
		this.imageroot = imageroot   // root of digit image filenames.  [imageroot][digit].gif  
		this.interval = 5
	   // methods
		this.decrement = DecrementClock
		this.increment = IncrementClock
		this.update = UpdateClock
		this.render = RenderClock
	}
	
	
// CLOCK methods

	function UpdateClock() {
	
		minutes = Math.round ((( this.time)/60)-.5);
		seconds = this.time % 60;

		tens =  ""+ Math.round((seconds / 10)-.5);
		tensecs = tens.substring(0,1);
		
		document.images[this.name + "1mins"].src =  this.imageroot + minutes + ".gif"	
		document.images[this.name + "10secs"].src = this.imageroot + tensecs + ".gif"
		document.images[this.name + "1secs"].src = this.imageroot + (seconds % 10) + ".gif"
	}
	
	function DecrementClock() {

		this.time -= this.interval;

		if (this.time < 0) {
			this.time = 0
			this.game.state = "lost"
			// document.explosion.play(false);	
			this.game.blockClicks = 1;
		}
		else {
			window.setTimeout( this.game.name + "." + this.name + ".decrement()", this.interval*1000);
		}
		this.update();
	}
	
	function IncrementClock() {

		this.time += this.interval;

		if (this.time > iSecondsLeft) {
			this.time = iSecondsLeft
			this.game.state = "lost"
			// document.explosion.play(false);	
			this.game.blockClicks = 1;
		}
		else {
			window.setTimeout( this.game.name + "." + this.name + ".increment()", this.interval*1000 );
		}
		this.update();
	}

	function RenderClock() {

		document.write("<img width=33 height=53 src='" + this.imageroot + "0" + ".gif' name=" + this.name + "1mins>")
		document.write("<img width=11 height=53 src='" + this.imageroot + "colon.gif' name=Colon>")
		document.write("<img width=33 height=53 src='" + this.imageroot + "0" + ".gif' name=" + this.name + "10secs>")
		document.write("<img width=33 height=53 src='" + this.imageroot + "0" + ".gif' name=" + this.name + "1secs>")
		
	}
		
	function GetDigit(iNumber, iDigit) {

		iNumber = "" + iNumber;  // Convert to "String" if it isn't already...

		while (iNumber.length < 2) {
			iNumber = "0" + iNumber;
		}
		return(iNumber.charAt(iDigit));
	}

	function LoadDigitImage(iDigit) {

	  var image = new Image();
	  image.src = "clock/" + iDigit+".gif";

	}  

	function LoadClockImages() {

		image8 = new Image();

		image9 = new Image();
		image9.src = "clock/9.gif";
	}

	<!-- Generic Game Functions -->
	function Restart() {
		location.reload();
	}
	
	function getCookie(Name) {
		var search = Name + "="
		if (document.cookie.length > 0) { // if there are any cookies
			offset = document.cookie.indexOf(search) 
			if (offset != -1) { // if cookie exists 
				offset += search.length 
				// set index of beginning of value
				end = document.cookie.indexOf(";", offset) 
				// set index of end of cookie value
				if (end == -1) 
					end = document.cookie.length
				return unescape(document.cookie.substring(offset, end))
			}
		}
	}
	
	function register(name) { 
          var today = new Date()
          var expires = new Date()
          expires.setTime(today.getTime() + 60*60*24*365)  // a year from now
          setCookie("TheCoolJavaScriptPage", name, expires)
	}
	
	function setHighScore(score) {

	}
	
	function setScores(name, value, expire) {
          document.cookie = name + "=" + escape(value)
          + ((expire == null) ? "" : ("; expires=" + expire.toGMTString()))
	}
	
	function Quit() {
		if (debug) alert("Quit");
	}

	function PlaySound(sound) {

		if (sound == null) {  
            return;
		}
		else {
			sound.play(false);
		}
	}


	</script>
